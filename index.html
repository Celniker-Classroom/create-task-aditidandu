<!-- A to-do list where you input your tasks and assignments, putting in the deadline date, and optionally ranking it by importance. You can give descriptions to the tasks. You can also add categories to organize the tasks better. There will also be a displayed calendar to give a more visual display of the tasks.-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom To-do list</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>To-do List</h1>

    <h2 id="msg">Add a task: </h2>
    <input id="task" type="text" placeholder="Enter a new task">
    <input id="deadline" type="date">
    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>        
    </select>
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>


</body>
</html>
